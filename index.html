<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Figurinhas - Copa 2026</title>
    <!-- Importando Tailwind CSS para manter o mesmo design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Desativa o highlight azul ao tocar em botões no telemóvel */
        button {
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== SISTEMA DE LOGIN ===== */
        #login-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: linear-gradient(135deg, #14532d 0%, #166534 40%, #15803d 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 1rem;
        }
        #login-overlay.hidden { display: none; }

        .login-card {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            width: 100%; max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            animation: loginSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes loginSlideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-tab-btn {
            flex: 1; padding: 0.5rem 1rem;
            font-weight: 600; font-size: 0.875rem;
            border-radius: 0.5rem; transition: all 0.2s;
            color: #6b7280;
        }
        .login-tab-btn.active {
            background: #16a34a; color: white;
        }

        .login-input {
            width: 100%; border: 2px solid #e5e7eb;
            border-radius: 0.75rem; padding: 0.625rem 0.875rem;
            font-size: 0.9375rem; outline: none;
            transition: border-color 0.2s;
        }
        .login-input:focus { border-color: #16a34a; }

        .login-btn-primary {
            width: 100%; background: #16a34a; color: white;
            font-weight: 700; font-size: 1rem;
            padding: 0.75rem; border-radius: 0.75rem;
            transition: background 0.2s, transform 0.1s;
        }
        .login-btn-primary:hover { background: #15803d; }
        .login-btn-primary:active { transform: scale(0.98); }

        .login-error {
            background: #fef2f2; border: 1px solid #fecaca;
            color: #dc2626; border-radius: 0.5rem;
            padding: 0.5rem 0.75rem; font-size: 0.875rem;
            display: none;
        }
        .login-error.visible { display: block; }

        /* Badge de utilizador no header */
        #user-badge {
            display: flex; align-items: center; gap: 0.5rem;
            background: rgba(255,255,255,0.15);
            border-radius: 9999px; padding: 0.25rem 0.75rem;
            font-size: 0.8125rem; font-weight: 600; cursor: pointer;
            transition: background 0.2s;
        }
        #user-badge:hover { background: rgba(255,255,255,0.25); }
        #user-badge .avatar {
            width: 1.5rem; height: 1.5rem;
            background: #fbbf24; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700; color: #92400e;
        }

        /* Modal de logout / perfis */
        #user-menu {
            position: absolute; top: calc(100% + 8px); right: 1rem;
            background: white; border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 0.75rem; min-width: 200px; z-index: 100;
            display: none;
        }
        #user-menu.open { display: block; animation: menuPop 0.2s ease; }
        @keyframes menuPop {
            from { opacity:0; transform: translateY(-8px) scale(0.95); }
            to   { opacity:1; transform: translateY(0) scale(1); }
        }
        .menu-item {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 0.75rem; border-radius: 0.5rem;
            font-size: 0.875rem; cursor: pointer;
            transition: background 0.15s; width: 100%;
            text-align: left;
        }
        .menu-item:hover { background: #f3f4f6; }
        .menu-item.danger { color: #dc2626; }
        .menu-item.danger:hover { background: #fef2f2; }
    </style>
</head>

<!-- ===== MODAL DE LOGIN ===== -->
<div id="login-overlay">
    <div class="login-card">
        <!-- Logo -->
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-green-100 rounded-2xl mb-3">
                <svg class="w-8 h-8 text-green-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            </div>
            <h1 class="text-2xl font-extrabold text-gray-900">Copa 2026</h1>
            <p class="text-gray-500 text-sm mt-1">Controle de Figurinhas</p>
        </div>

        <!-- Tabs -->
        <div class="flex bg-gray-100 rounded-xl p-1 mb-5 gap-1">
            <button class="login-tab-btn active" id="tab-login" onclick="switchTab('login')">Entrar</button>
            <button class="login-tab-btn" id="tab-register" onclick="switchTab('register')">Criar Conta</button>
        </div>

        <!-- Formulário Login -->
        <div id="form-login" class="space-y-3">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Utilizador</label>
                <input id="login-username" type="text" class="login-input" placeholder="O seu nome de utilizador" autocomplete="username">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Senha</label>
                <input id="login-password" type="password" class="login-input" placeholder="••••••••" autocomplete="current-password">
            </div>
            <div id="login-error" class="login-error">Utilizador ou senha incorretos.</div>
            <button class="login-btn-primary mt-2" onclick="doLogin()">
                Entrar
            </button>
        </div>

        <!-- Formulário Registo -->
        <div id="form-register" class="space-y-3 hidden">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nome de Utilizador</label>
                <input id="reg-username" type="text" class="login-input" placeholder="Escolha um nome" autocomplete="username">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Senha</label>
                <input id="reg-password" type="password" class="login-input" placeholder="Mínimo 4 caracteres" autocomplete="new-password">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Confirmar Senha</label>
                <input id="reg-confirm" type="password" class="login-input" placeholder="Repita a senha" autocomplete="new-password">
            </div>
            <div id="reg-error" class="login-error"></div>
            <button class="login-btn-primary mt-2" onclick="doRegister()">
                Criar Conta
            </button>
        </div>

        <p class="text-center text-xs text-gray-400 mt-4">Os dados são guardados localmente neste dispositivo.</p>
    </div>
</div>

<body class="min-h-screen bg-gray-100 font-sans pb-20">

    <!-- Header Fixo -->
    <header class="bg-green-700 text-white shadow-lg sticky top-0 z-50 relative">
        <div class="max-w-5xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center space-x-2">
                    <!-- Ícone Trophy -->
                    <svg class="w-6 h-6 text-yellow-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                    <h1 class="text-xl font-extrabold tracking-tight">Copa 2026</h1>
                </div>
                
                <!-- Badge do utilizador logado -->
                <div id="user-badge" onclick="toggleUserMenu()">
                    <div class="avatar" id="user-avatar-initial">?</div>
                    <span id="user-display-name">Utilizador</span>
                    <svg class="w-3 h-3 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </div>

                <!-- Menu dropdown -->
                <div id="user-menu">
                    <div class="px-3 py-1 mb-1">
                        <p class="text-xs text-gray-400 font-medium">SESSÃO ATIVA</p>
                        <p id="menu-username" class="font-bold text-gray-800 text-sm"></p>
                    </div>
                    <hr class="border-gray-100 mb-1">
                    <button class="menu-item" onclick="switchAccount()">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        Trocar Conta
                    </button>
                    <button class="menu-item danger" onclick="confirmDeleteAccount()">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        Apagar Conta
                    </button>
                </div>

                <div class="flex bg-green-800 rounded-lg p-1 space-x-1">
                    <button id="btn-view-grid" onclick="setViewMode('grid')" title="Visualização em Grade">
                        <!-- Ícone LayoutGrid -->
                        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
                    </button>
                    <button id="btn-view-list" onclick="setViewMode('list')" title="Visualização em Lista">
                        <!-- Ícone List -->
                        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>
                    </button>
                </div>
            </div>

            <!-- Barra de Progresso -->
            <div class="bg-green-800/50 rounded-xl p-4 backdrop-blur-sm border border-green-600/50">
                <div class="flex justify-between items-end mb-2">
                    <div>
                        <p class="text-green-200 text-sm font-medium mb-1">O Meu Álbum</p>
                        <p class="text-2xl font-bold">
                            <span id="progress-count">0</span> <span id="progress-total" class="text-base font-normal text-green-200">/ 0</span>
                        </p>
                    </div>
                    <div class="text-right">
                        <span id="progress-percentage" class="text-3xl font-black">0%</span>
                    </div>
                </div>
                <div class="w-full bg-green-900 rounded-full h-3 mb-1 overflow-hidden">
                    <div id="progress-bar" class="bg-yellow-400 h-3 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main id="main-content" class="max-w-5xl mx-auto px-4 py-6 space-y-8">
        <!-- O conteúdo será gerado dinamicamente via JavaScript -->
    </main>

    <script>
        // Dados da base do Álbum
        const TEAM_PREFIXES = [
            'MEX', 'RSA', 'KOR', 'CZE', 'CAN', 'BIH', 'QAT', 'SUI', 'BRA', 'MAR', 
            'HAI', 'SCO', 'USA', 'PAR', 'AUS', 'TUR', 'GER', 'CUW', 'CIV', 'ECU', 
            'NED', 'JPN', 'SWE', 'TUN', 'BEL', 'EGY', 'IRN', 'NZL', 'ESP', 'CPV', 
            'KSA', 'URU', 'FRA', 'SEN', 'IRQ', 'NOR', 'ARG', 'ALG', 'AUT', 'JOR', 
            'POR', 'COD', 'UZB', 'COL', 'ENG', 'CRO', 'GHA', 'PAN'
        ];

        const SECTIONS = [
            {
                id: 'specials',
                title: 'Especiais (FWC / CC / Extras)',
                stickers: [
                    '80', 
                    ...Array.from({ length: 19 }, (_, i) => `FWC${i + 1}`),
                    ...Array.from({ length: 14 }, (_, i) => `CC${i + 1}`)
                ]
            },
            {
                id: 'teams',
                title: 'Seleções (1 a 20)',
                groups: TEAM_PREFIXES.map(prefix => ({
                    prefix,
                    title: `Seleção: ${prefix}`,
                    stickers: Array.from({ length: 20 }, (_, i) => `${prefix}${i + 1}`)
                }))
            }
        ];

        // ===== SISTEMA DE AUTENTICAÇÃO =====
        function getAuthStore() {
            return JSON.parse(localStorage.getItem('copa2026_auth') || '{"users":{},"currentUser":null}');
        }
        function saveAuthStore(store) {
            localStorage.setItem('copa2026_auth', JSON.stringify(store));
        }

        function switchTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('form-login').classList.toggle('hidden', !isLogin);
            document.getElementById('form-register').classList.toggle('hidden', isLogin);
            document.getElementById('tab-login').classList.toggle('active', isLogin);
            document.getElementById('tab-register').classList.toggle('active', !isLogin);
            document.getElementById('login-error').classList.remove('visible');
            document.getElementById('reg-error').classList.remove('visible');
        }

        function doLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const errEl = document.getElementById('login-error');
            const store = getAuthStore();
            if (!username || !password) { errEl.textContent = 'Preencha todos os campos.'; errEl.classList.add('visible'); return; }
            const user = store.users[username.toLowerCase()];
            if (!user || user.password !== btoa(password)) {
                errEl.textContent = 'Utilizador ou senha incorretos.';
                errEl.classList.add('visible'); return;
            }
            store.currentUser = username.toLowerCase();
            saveAuthStore(store);
            startSession(username.toLowerCase());
        }

        function doRegister() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm  = document.getElementById('reg-confirm').value;
            const errEl    = document.getElementById('reg-error');
            const store    = getAuthStore();
            if (!username || !password) { errEl.textContent = 'Preencha todos os campos.'; errEl.classList.add('visible'); return; }
            if (username.length < 3)    { errEl.textContent = 'O nome deve ter pelo menos 3 caracteres.'; errEl.classList.add('visible'); return; }
            if (password.length < 4)    { errEl.textContent = 'A senha deve ter pelo menos 4 caracteres.'; errEl.classList.add('visible'); return; }
            if (password !== confirm)   { errEl.textContent = 'As senhas não coincidem.'; errEl.classList.add('visible'); return; }
            if (store.users[username.toLowerCase()]) { errEl.textContent = 'Este nome já está em uso.'; errEl.classList.add('visible'); return; }
            store.users[username.toLowerCase()] = { password: btoa(password), stickers: {} };
            store.currentUser = username.toLowerCase();
            saveAuthStore(store);
            startSession(username.toLowerCase());
        }

        function startSession(username) {
            const store = getAuthStore();
            collected = store.users[username]?.stickers || {};
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('user-display-name').textContent = username;
            document.getElementById('user-avatar-initial').textContent = username[0].toUpperCase();
            document.getElementById('menu-username').textContent = username;
            document.getElementById('main-content').innerHTML = '';
            initApp();
        }

        function toggleUserMenu() {
            document.getElementById('user-menu').classList.toggle('open');
        }
        document.addEventListener('click', (e) => {
            if (!document.getElementById('user-badge')?.contains(e.target) &&
                !document.getElementById('user-menu')?.contains(e.target)) {
                document.getElementById('user-menu')?.classList.remove('open');
            }
        });

        function switchAccount() {
            const store = getAuthStore();
            store.currentUser = null;
            saveAuthStore(store);
            location.reload();
        }

        function confirmDeleteAccount() {
            const store = getAuthStore();
            const username = store.currentUser;
            if (confirm(`Apagar a conta "${username}" e todo o progresso? Esta ação não pode ser desfeita.`)) {
                delete store.users[username];
                store.currentUser = null;
                saveAuthStore(store);
                location.reload();
            }
        }

        function checkAutoLogin() {
            const store = getAuthStore();
            if (store.currentUser && store.users[store.currentUser]) {
                startSession(store.currentUser);
            } else {
                document.getElementById('login-overlay').classList.remove('hidden');
                ['login-username','login-password'].forEach(id => {
                    document.getElementById(id)?.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
                });
                ['reg-username','reg-password','reg-confirm'].forEach(id => {
                    document.getElementById(id)?.addEventListener('keydown', e => { if(e.key==='Enter') doRegister(); });
                });
            }
        }

        // Variáveis de Estado
        let collected = {};
        let viewMode = 'grid'; // 'grid' ou 'list'

        // Ícones SVG reutilizáveis
        const iconCheck = `<svg class="w-5 h-5 mr-2 text-green-600" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`;
        const iconTrophySmall = `<svg class="w-4 h-4 mr-1.5 text-yellow-500 inline-block" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>`;
        const iconSearch = `<svg class="w-5 h-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>`;

        // Inicializa o layout HTML principal
        function initApp() {
            const main = document.getElementById('main-content');

            // --- HTML: Secção de Especiais ---
            let specialsHtml = `
            <section class="bg-white rounded-2xl p-4 sm:p-6 shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-gray-800 flex items-center">
                        ${iconCheck} ${SECTIONS[0].title}
                    </h2>
                    <div class="space-x-2">
                        <button onclick="markGroup(0, null, true)" class="text-xs bg-gray-100 hover:bg-green-100 text-gray-700 font-semibold py-1.5 px-3 rounded-md transition-colors">
                            Marcar Todas
                        </button>
                    </div>
                </div>
                <div id="specials-grid" class="grid gap-2 sm:gap-3">
                    ${SECTIONS[0].stickers.map(id => `
                        <button id="btn-${id}" onclick="toggleSticker('${id}')" style="min-height: 48px;">
                            ${id}
                        </button>
                    `).join('')}
                </div>
            </section>`;

            // --- HTML: Secção de Seleções (COM BARRA DE PESQUISA) ---
            let teamsHtml = `
            <div class="space-y-6 pt-4">
                
                <!-- Cabeçalho e Barra de Pesquisa -->
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b-2 border-green-500 pb-3">
                    <h2 class="text-xl font-black text-gray-800 shrink-0">
                        ${SECTIONS[1].title}
                    </h2>
                    
                    <div class="relative w-full sm:w-80">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            ${iconSearch}
                        </div>
                        <input 
                            type="text" 
                            id="search-input" 
                            oninput="handleSearch(this.value)" 
                            class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-xl leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 sm:text-sm transition-shadow shadow-sm" 
                            placeholder="Pesquisar seleção (ex: BRA, POR, ARG)..."
                        >
                    </div>
                </div>

                <!-- Lista de Seleções -->
                <div id="teams-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${SECTIONS[1].groups.map((group, idx) => `
                        <section id="group-section-${idx}" data-prefix="${group.prefix.toLowerCase()}">
                            <div class="flex justify-between items-center mb-3">
                                <div>
                                    <h3 id="group-title-${idx}" class="font-bold text-gray-800 text-lg flex items-center">${group.prefix}</h3>
                                    <p id="group-subtitle-${idx}" class="text-xs text-gray-500 font-medium"></p>
                                </div>
                                <button id="group-action-${idx}"></button>
                            </div>
                            <div class="grid grid-cols-5 gap-1.5">
                                ${group.stickers.map(id => {
                                    const numberOnly = id.replace(group.prefix, '');
                                    return `
                                    <button id="btn-${id}" onclick="toggleSticker('${id}')" title="${id}">
                                        ${numberOnly}
                                    </button>`;
                                }).join('')}
                            </div>
                        </section>
                    `).join('')}
                </div>
                
                <!-- Mensagem de Nenhum Resultado -->
                <div id="no-results-msg" class="hidden text-center py-8 text-gray-500">
                    <p>Nenhuma seleção encontrada com essa sigla.</p>
                </div>
            </div>`;

            main.innerHTML = specialsHtml + teamsHtml;
            
            updateViewMode();
            updateUI();
        }

        // Função de Pesquisa
        function handleSearch(term) {
            const query = term.toLowerCase().trim();
            let hasVisibleTeams = false;

            SECTIONS[1].groups.forEach((group, idx) => {
                const sectionEl = document.getElementById(`group-section-${idx}`);
                if (sectionEl) {
                    if (group.prefix.toLowerCase().includes(query)) {
                        sectionEl.style.display = 'block';
                        hasVisibleTeams = true;
                    } else {
                        sectionEl.style.display = 'none';
                    }
                }
            });

            const noResultsMsg = document.getElementById('no-results-msg');
            if (noResultsMsg) {
                noResultsMsg.style.display = hasVisibleTeams ? 'none' : 'block';
            }
        }

        // Funções de Ação
        function toggleSticker(id) {
            collected[id] = !collected[id];
            saveAndRefresh();
        }

        function markGroup(sectionIdx, groupIdx, targetState) {
            let stickersToUpdate = [];
            
            if (sectionIdx === 0) {
                stickersToUpdate = SECTIONS[0].stickers;
            } else {
                stickersToUpdate = SECTIONS[1].groups[groupIdx].stickers;
            }

            stickersToUpdate.forEach(id => {
                collected[id] = targetState;
            });
            
            saveAndRefresh();
        }

        function saveAndRefresh() {
            const store = getAuthStore();
            if (store.currentUser) {
                store.users[store.currentUser].stickers = collected;
                saveAuthStore(store);
            }
            updateUI();
        }

        function setViewMode(mode) {
            viewMode = mode;
            updateViewMode();
        }

        function updateViewMode() {
            const gridBtn = document.getElementById('btn-view-grid');
            const listBtn = document.getElementById('btn-view-list');
            const gridEl = document.getElementById('specials-grid');

            if(viewMode === 'grid') {
                gridBtn.className = 'p-1.5 rounded-md transition-colors bg-green-600 text-white';
                listBtn.className = 'p-1.5 rounded-md transition-colors text-green-300 hover:text-white';
                if(gridEl) gridEl.className = 'grid gap-2 sm:gap-3 grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10';
            } else {
                listBtn.className = 'p-1.5 rounded-md transition-colors bg-green-600 text-white';
                gridBtn.className = 'p-1.5 rounded-md transition-colors text-green-300 hover:text-white';
                if(gridEl) gridEl.className = 'grid gap-2 sm:gap-3 grid-cols-3 sm:grid-cols-4';
            }
        }

        // Atualiza as cores e o progresso na interface de forma dinâmica
        function updateUI() {
            // Cálculos de Progresso
            let total = SECTIONS[0].stickers.length;
            SECTIONS[1].groups.forEach(g => total += g.stickers.length);
            
            const collectedCount = Object.values(collected).filter(Boolean).length;
            const percentage = total === 0 ? 0 : Math.round((collectedCount / total) * 100);

            // Atualiza Header
            document.getElementById('progress-count').innerText = collectedCount;
            document.getElementById('progress-total').innerText = `/ ${total}`;
            document.getElementById('progress-percentage').innerText = `${percentage}%`;
            document.getElementById('progress-bar').style.width = `${percentage}%`;

            // Atualiza Botões da Secção de Especiais
            SECTIONS[0].stickers.forEach(id => {
                const btn = document.getElementById(`btn-${id}`);
                if (!btn) return;
                
                if (collected[id]) {
                    btn.className = `relative flex items-center justify-center p-2 rounded-lg font-bold text-sm transition-all duration-200 border-2 shadow-sm touch-manipulation bg-green-500 border-green-600 text-white shadow-green-500/30`;
                } else {
                    btn.className = `relative flex items-center justify-center p-2 rounded-lg font-bold text-sm transition-all duration-200 border-2 shadow-sm touch-manipulation bg-white border-gray-200 text-gray-600 hover:border-green-300 hover:bg-green-50`;
                }
            });

            // Atualiza Botões da Secção de Seleções
            SECTIONS[1].groups.forEach((group, idx) => {
                let groupCollected = 0;
                
                group.stickers.forEach(id => {
                    if (collected[id]) groupCollected++;
                    
                    const btn = document.getElementById(`btn-${id}`);
                    if (!btn) return;
                    
                    if (collected[id]) {
                        btn.className = `aspect-square flex items-center justify-center rounded font-bold text-xs sm:text-sm transition-all border touch-manipulation bg-green-500 border-green-600 text-white`;
                    } else {
                        btn.className = `aspect-square flex items-center justify-center rounded font-bold text-xs sm:text-sm transition-all border touch-manipulation bg-gray-50 border-gray-200 text-gray-500 hover:border-green-300`;
                    }
                });

                const isComplete = groupCollected === group.stickers.length;
                
                // Atualiza Metadados do Grupo
                const sectionEl = document.getElementById(`group-section-${idx}`);
                const titleEl = document.getElementById(`group-title-${idx}`);
                const subtitleEl = document.getElementById(`group-subtitle-${idx}`);
                const actionBtn = document.getElementById(`group-action-${idx}`);

                if(sectionEl) {
                    // Mantém a lógica de visibilidade de pesquisa intacta reatribuindo apenas as classes de aparência
                    sectionEl.className = `bg-white rounded-2xl p-4 shadow-sm border transition-colors ${isComplete ? 'border-green-400 bg-green-50/30' : 'border-gray-200'}`;
                }
                
                if(subtitleEl) {
                    subtitleEl.innerText = `${groupCollected} de ${group.stickers.length} figurinhas`;
                }

                if(actionBtn) {
                    if (isComplete) {
                        actionBtn.innerText = 'Desmarcar';
                        actionBtn.className = 'text-xs font-semibold py-1 px-2.5 rounded-md transition-colors text-red-600 bg-red-50 hover:bg-red-100';
                        actionBtn.onclick = () => markGroup(1, idx, false);
                    } else {
                        actionBtn.innerText = 'Completar';
                        actionBtn.className = 'text-xs font-semibold py-1 px-2.5 rounded-md transition-colors text-green-700 bg-green-50 hover:bg-green-100';
                        actionBtn.onclick = () => markGroup(1, idx, true);
                    }
                }

                if(titleEl) {
                    titleEl.innerHTML = (isComplete ? iconTrophySmall : '') + group.prefix;
                }
            });
        }

        // Inicializa a aplicação ao carregar a página
        document.addEventListener('DOMContentLoaded', checkAutoLogin);

    </script>
</body>
</html>
